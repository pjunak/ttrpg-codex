name: Build and dispatch

# Drop into an app repo's .github/workflows/ directory.
#
# On every push to main: builds a Docker image, pushes to GHCR with both
# :latest and :sha-<commit> tags, then fires a repository_dispatch event
# at the infrastructure repo to trigger a deploy.
#
# Required configuration in the app repo (Settings → Secrets and variables → Actions):
#   Secret   INFRA_DISPATCH_TOKEN   fine-grained PAT for the infra repo
#   Variable INFRA_REPO             owner/infra-repo (e.g. pjunak/junak.eu)
#   Variable INFRA_SERVICE          stack directory name (e.g. tiamat). May be a
#                                   space/comma-separated LIST to deploy several
#                                   stacks from one image push (e.g. "tiamat asurai")
#                                   — useful when multiple instances share this
#                                   image. Each becomes its own deploy dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: npm ci

      # Same suite as `npm test`, with file-level concurrency capped so
      # the integration tests (each spawns a real server child process)
      # don't overwhelm the 2-core runner and flake on boot timeouts.
      - run: node --test --test-concurrency=4 "test/**/*.test.*js"

  build:
    name: Build and push image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        env:
          REPO: ${{ github.repository }}
        run: echo "name=ghcr.io/${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # INFRA_SERVICE may be one service or a list ("tiamat asurai"). Resolve it to
  # a JSON array so the dispatch job can fan out one deploy per service — the
  # infra deploy workflow takes a single service per event and serialises runs,
  # so N events redeploy N stacks safely from one image push.
  resolve-targets:
    name: Resolve deploy targets
    needs: build
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.list.outputs.services }}
    steps:
      - name: Parse INFRA_SERVICE into a JSON array
        id: list
        env:
          TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          REPO: ${{ vars.INFRA_REPO }}
          SERVICE: ${{ vars.INFRA_SERVICE }}
        run: |
          set -euo pipefail
          : "${TOKEN:?INFRA_DISPATCH_TOKEN secret is not set}"
          : "${REPO:?INFRA_REPO variable is not set (e.g. owner/infra-repo)}"
          : "${SERVICE:?INFRA_SERVICE variable is not set (e.g. tiamat, or a list: tiamat asurai)}"
          # Split on commas and/or any whitespace; drop empties.
          services=$(printf '%s' "$SERVICE" | jq -Rsc 'split("[,\\s]+";"") | map(select(length > 0))')
          if [[ "$services" == "[]" ]]; then
            echo "::error::INFRA_SERVICE parsed to an empty list"
            exit 1
          fi
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "Deploy targets: $services"

  dispatch:
    name: Dispatch deploy (${{ matrix.service }})
    needs: [build, resolve-targets]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.resolve-targets.outputs.services) }}
    steps:
      - name: Trigger infra deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: ${{ vars.INFRA_REPO }}
          event-type: deploy
          client-payload: |-
            {
              "service": "${{ matrix.service }}",
              "sha": "${{ github.sha }}"
            }
